<div class="contacto-container">
  <h1>📧 Contacto</h1>
  <p class="subtitle">¿Tienes preguntas sobre el Mundial 2026? Escríbenos</p>

  <div class="contacto-content">
    <div class="contacto-info">
      <div class="info-item">
        <span class="icon">📞</span>
        <div>
          <h4>Teléfono</h4>
          <p>+51 987 654 321</p>
        </div>
      </div>
      <div class="info-item">
        <span class="icon">✉️</span>
        <div>
          <h4>Email</h4>
          <p>info@mundial2026.com</p>
        </div>
      </div>
      <div class="info-item">
        <span class="icon">📍</span>
        <div>
          <h4>Dirección</h4>
          <p>Lima, Perú</p>
        </div>
      </div>
      <div class="info-item">
        <span class="icon">🌐</span>
        <div>
          <h4>Redes Sociales</h4>
          <p>@mundial2026</p>
        </div>
      </div>
    </div>

    <div class="contacto-form">
      <h3>Envíanos un mensaje</h3>
      <form>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="Tu nombre" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label>Mensaje</label>
          <textarea rows="4" placeholder="Escribe tu mensaje..."></textarea>
        </div>
        <button type="submit">Enviar Mensaje</button>
      </form>
    </div>
  </div>
</div>
